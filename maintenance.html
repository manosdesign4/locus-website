<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Locus Design + Innovation</title>
  <link rel="icon" type="image/x-icon" href="/favicon.ico">
  <link rel="preconnect" href="https://fonts.googleapis.com">

  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    *{margin:0;padding:0;box-sizing:border-box}

  <div class="wrap">
    <img src="/logo_grey-blue.png" alt="Locus Design + Innovation">

    <p>In the meantime, you can reach us at<br><a href="mailto:locusforinnovation@gmail.com">locusforinnovation@gmail.com</a></p>
    <img src="/walking-figure.png" alt="" class="sep">
